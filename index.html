<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kiosco Nelson</title>

<link rel="preload" as="image" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ────────────────────────────────────── */
:root{
  --bg:        #0d0b09;
  --surface:   #191612;
  --card:      #221e19;
  --card-2:    #2c2720;
  --border:    rgba(255,255,255,.07);
  --border-2:  rgba(255,255,255,.12);

  --amber:     #f59e0b;
  --amber-dim: rgba(245,158,11,.13);
  --amber-hi:  #fbbf24;
  --green-wa:  #25D366;
  --green-wa2: #1ca44e;
  --red:       #ef4444;

  --txt:       #f5f0eb;
  --txt-2:     #a09890;
  --txt-3:     #5c554e;

  --r:         16px;
  --r-sm:      10px;
  --r-xs:      8px;
  --shadow:    0 4px 20px rgba(0,0,0,.45);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.65);

  --hdr-h:     64px;
  --drawer-w:  380px;

  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}
@media(max-width:680px){ :root{ --drawer-w: 88vw; } }

/* ── RESET ──────────────────────────────────────── */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; scroll-behavior:auto; }
body{ background:var(--bg); color:var(--txt); }
a{ color:inherit; text-decoration:none; }
button{ cursor:pointer; font-family:inherit; border:none; background:none; }
img{ display:block; max-width:100%; }

/* ── SPLASH ─────────────────────────────────────── */
#splash{
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
  background:var(--bg);
  opacity:1; visibility:visible;
  transition: opacity .35s ease, visibility .35s ease;
}
#splash.is-hidden{ opacity:0; visibility:hidden; }
#splashLogo{
  width:min(160px,42vw); height:auto; object-fit:contain;
  filter:drop-shadow(0 6px 20px rgba(245,158,11,.25));
  animation: splashPop .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashPop{ from{opacity:0;transform:scale(.6)} to{opacity:1;transform:scale(1)} }

.loader{
  width:min(200px,50vw); height:4px;
  background:var(--card-2); border-radius:99px; overflow:hidden;
}
.loader::after{
  content:""; display:block; height:100%;
  width:0%; transform-origin:left;
  background:linear-gradient(90deg, var(--amber), var(--green-wa));
  animation: fill 2.4s ease forwards;
  border-radius:99px;
}
@keyframes fill{ to{ width:100%; } }

.splash-name{
  font-size:13px; font-weight:600; letter-spacing:.4px;
  color:var(--txt-2);
}

/* ── HEADER ─────────────────────────────────────── */
header{
  position:sticky; top:0; z-index:100;
  height:var(--hdr-h);
  background:rgba(25,22,18,.92);
  backdrop-filter:blur(20px) saturate(1.6);
  -webkit-backdrop-filter:blur(20px) saturate(1.6);
  border-bottom:1px solid var(--border);
  display:grid;
  grid-template-columns: auto 1fr auto auto;
  align-items:center;
  gap:12px; padding:0 16px;
}

.logoWrap{
  display:flex; align-items:center;
  cursor:pointer; height:100%;
  flex-shrink:0;
}
.logoWrap img{
  height:38px; width:auto; object-fit:contain;
  transition:opacity .15s;
}
.logoWrap:hover img{ opacity:.8; }

/* Search */
.search{
  position:relative;
  display:flex; align-items:center;
}
.search svg{
  position:absolute; left:12px; color:var(--txt-3);
  pointer-events:none; flex-shrink:0;
}
.search input{
  width:100%; height:40px;
  background:var(--card); border:1px solid var(--border);
  border-radius:12px;
  padding:0 36px 0 40px;
  font-family:inherit; font-size:14px; font-weight:500;
  color:var(--txt); outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.search input::placeholder{ color:var(--txt-3); }
.search input:focus{
  border-color:rgba(245,158,11,.45);
  box-shadow:0 0 0 3px rgba(245,158,11,.09);
}

/* Header icon buttons */
.iconBlock{ display:flex; flex-direction:column; align-items:center; gap:3px; }
.iconBtn{
  position:relative;
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  border-radius:12px;
  background:var(--card); border:1px solid var(--border);
  color:var(--txt-2);
  transition:background .15s, color .15s, transform .12s;
  flex-shrink:0;
}
.iconBtn svg{ width:20px; height:20px; }
.iconBtn:hover{ background:var(--card-2); color:var(--txt); }
.iconBtn:active,.iconBtn.is-pressing{ transform:scale(.93); }
.iconLabel{
  font-size:10px; font-weight:600; color:var(--txt-3);
  letter-spacing:.2px; line-height:1;
}

.badge{
  position:absolute; top:-6px; right:-6px;
  min-width:18px; height:18px; padding:0 5px;
  background:var(--amber); color:#000;
  border-radius:99px;
  font-size:10px; font-weight:800;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.badge.on{ display:flex; }

@media(max-width:520px){
  header{ grid-template-columns: auto 1fr auto auto; gap:8px; padding:0 12px; }
  .logoWrap img{ height:30px; }
}
@media(max-width:360px){
  .logoWrap{ display:none; }
  header{ grid-template-columns: 1fr auto auto; }
}

/* pressable generic */
.pressable{ touch-action:manipulation; user-select:none; will-change:transform; }
.pressable:active,.pressable.is-pressing{ transform:scale(.95); }

/* ── VIEW SHELL ──────────────────────────────────── */
#view{ position:relative; min-height:60vh; overflow:hidden; }

.page{
  position:absolute; inset:0;
  background:var(--bg);
  z-index:2;
  transform:translateX(100%); opacity:0;
  transition:transform .32s cubic-bezier(.22,.61,.36,1), opacity .32s;
  touch-action:pan-y; overflow:visible;
}
.page.active{ transform:translateX(0); opacity:1; }
.page.exit-right{ transform:translateX(100%); opacity:0; }

/* ── HOME GRID ───────────────────────────────────── */
.homeGrid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  padding:20px 16px 100px;
}
@media(max-width:920px){ .homeGrid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:520px){ .homeGrid{ grid-template-columns:1fr; gap:10px; padding:14px 12px 80px; } }

/* ── ONBOARDING BANNER ── */
#onboarding{
  margin:16px 16px 0;
  background:linear-gradient(135deg,#1e1a10,#2a2210);
  border:1px solid rgba(245,158,11,.25);
  border-radius:18px;
  padding:16px 18px;
  display:flex; align-items:flex-start; gap:14px;
  animation: fadeSlideIn .4s cubic-bezier(.22,.61,.36,1) both;
}
#onboarding.hidden{ display:none; }
@keyframes fadeSlideIn{ from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

.ob-icon{ font-size:28px; line-height:1; flex-shrink:0; margin-top:2px; }
.ob-body{ flex:1; min-width:0; }
.ob-title{ font-size:14px; font-weight:800; color:var(--amber); margin-bottom:8px; }
.ob-steps{ display:flex; flex-direction:column; gap:5px; }
.ob-step{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--txt-2); }
.ob-num{
  width:20px; height:20px; flex-shrink:0;
  background:var(--amber-dim); border:1px solid rgba(245,158,11,.3);
  border-radius:99px; color:var(--amber);
  font-size:10px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
.ob-close{
  flex-shrink:0; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px; color:var(--txt-3);
  font-size:18px; line-height:1;
  transition:background .15s, color .15s;
  margin-top:-2px;
}
.ob-close:hover{ background:var(--card-2); color:var(--txt); }

/* Category tile */
.tile{
  position:relative;
  border-radius:20px;
  height:clamp(140px,28vmin,240px);
  overflow:hidden;
  cursor:pointer;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  will-change:transform;
  transition:transform .18s ease, box-shadow .18s ease;
}
.tile:hover{ transform:translateY(-3px) scale(1.02); box-shadow:var(--shadow-lg); }
.tile.is-pressing{ transform:scale(.97); }

.tile__bg{
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  filter:brightness(.7) saturate(1.2);
  transition:transform .35s ease;
}
.tile:hover .tile__bg{ transform:scale(1.07); }

.tile__scrim{
  position:absolute; inset:0;
  background:linear-gradient(to top,
    rgba(0,0,0,.85) 0%,
    rgba(0,0,0,.25) 55%,
    transparent 100%);
}
.tile__content{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  justify-content:flex-end; padding:16px;
}
.tile__emoji{ font-size:28px; margin-bottom:6px; line-height:1; }
.tile__label{
  font-size:clamp(15px,2.6vmin,20px);
  font-weight:800; color:#fff;
  line-height:1.2;
  text-shadow:0 1px 6px rgba(0,0,0,.5);
}
.tile__sub{
  font-size:11px; font-weight:500;
  color:rgba(255,255,255,.6);
  margin-top:4px;
}

/* Offers tile highlight */
.tile--offers{
  background:linear-gradient(135deg,#0c1e10,#142a18);
  border-color:rgba(37,211,102,.22);
}
.tile--offers .tile__label{ color:var(--green-wa); }
.offer-dot{
  position:absolute; top:12px; right:12px;
  background:var(--green-wa); color:#000;
  font-size:9px; font-weight:800;
  padding:3px 8px; border-radius:99px;
  text-transform:uppercase; letter-spacing:.3px;
}

/* ── CATALOGUE PAGE ──────────────────────────────── */
.titleBar{
  display:flex; align-items:center; gap:12px;
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
}
.titleBar h2{
  flex:1;
  font-size:clamp(17px,3vmin,22px);
  font-weight:800; color:var(--txt);
}
.backBtn{
  display:inline-flex; align-items:center; gap:7px;
  padding:8px 14px; border-radius:var(--r-sm);
  border:1px solid var(--border);
  background:var(--card);
  font-size:13px; font-weight:600;
  color:var(--txt-2);
  transition:background .15s, color .15s, transform .12s;
}
.backBtn:hover{ background:var(--card-2); color:var(--txt); }
.backBtn svg{ width:14px; height:14px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
  gap:12px;
  padding:16px;
  overflow:visible;
}
@media(max-width:520px){ .grid{ grid-template-columns:repeat(2,1fr); gap:10px; padding:12px; } }

/* Product card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 2px 12px rgba(0,0,0,.35);
  transition:transform .18s, box-shadow .18s;
}
.card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }

.ph{
  aspect-ratio:1;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface);
  overflow:hidden;
}
.ph img{
  width:100%; height:100%;
  object-fit:contain; padding:12px;
  transition:transform .3s;
}
.card:hover .ph img{ transform:scale(1.07); }
.ph-empty{
  font-size:12px; color:var(--txt-3); font-weight:500;
}

.info{ padding:12px 12px 0; display:flex; flex-direction:column; gap:4px; }
.prod-brand{
  font-size:10px; font-weight:700;
  color:var(--txt-3); text-transform:uppercase; letter-spacing:.5px;
}
.prod-name{
  font-size:13px; font-weight:700; color:var(--txt); line-height:1.3;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.prod-price{
  font-size:18px; font-weight:900; color:var(--amber);
  letter-spacing:-.3px; margin-top:2px;
}
.prod-unit{ font-size:10px; color:var(--txt-3); font-weight:500; }

.qtyRow{
  display:flex; flex-direction:column;
  padding:10px 12px 14px; gap:8px; margin-top:auto;
}
.qtyCtrl{ display:flex; align-items:center; gap:8px; }

.btnIcon{
  width:34px; height:34px;
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:var(--r-xs); border:1px solid var(--border);
  background:var(--surface); color:var(--txt-2);
  font-size:17px; font-weight:800;
  transition:background .12s, color .12s, transform .1s;
}
.btnIcon:hover{ background:var(--card-2); color:var(--txt); }
.btnIcon:active,.btnIcon.is-pressing{ transform:scale(.9); }

.qty{
  font-size:15px; font-weight:800; min-width:20px; text-align:center;
}

.btnPrimary{
  width:100%;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 12px; border-radius:12px;
  background:var(--amber); color:#000;
  font-family:inherit; font-size:13px; font-weight:800;
  transition:background .12s, transform .1s, box-shadow .12s;
  box-shadow:0 3px 10px rgba(245,158,11,.3);
}
.btnPrimary:hover{ background:var(--amber-hi); box-shadow:0 4px 14px rgba(245,158,11,.4); }
.btnPrimary:active,.btnPrimary.is-pressing{ transform:scale(.96); }
.btnPrimary svg{ width:15px; height:15px; flex-shrink:0; }

/* ── CART DRAWER ─────────────────────────────────── */
.drawerOverlay{
  position:fixed; inset:0; z-index:40;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  opacity:0; pointer-events:none;
  transition:opacity .28s;
}
.drawerOverlay.show{ opacity:1; pointer-events:auto; }

.drawer{
  position:fixed; top:0; right:0;
  width:var(--drawer-w);
  height:100dvh;
  background:var(--surface);
  border-left:1px solid var(--border);
  box-shadow:-6px 0 40px rgba(0,0,0,.6);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.22,.61,.36,1);
  z-index:41; display:flex; flex-direction:column;
  touch-action:pan-y;
}
.drawer.open{ transform:translateX(0); }
.drawer > header, .cartTotal{ touch-action:none; }

.drawer > header{
  display:flex; align-items:center; gap:12px;
  padding:18px 18px 16px;
  border-bottom:1px solid var(--border);
  background:transparent; box-shadow:none;
  position:static; height:auto; grid-template-columns:unset;
}
.drawer > header h3{
  flex:1;
  font-size:18px; font-weight:800; color:var(--txt);
}
.cart-chip{
  background:var(--amber-dim); border:1px solid rgba(245,158,11,.25);
  color:var(--amber);
  font-size:11px; font-weight:700;
  padding:3px 10px; border-radius:99px;
}

.cartList{ flex:1; min-height:0; overflow:auto; padding:12px; display:flex; flex-direction:column; gap:8px;
  scrollbar-width:thin; scrollbar-color:var(--card) transparent; }

/* Cart empty state */
.cartEmpty{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px; padding:40px 20px; text-align:center;
}
.cartEmpty-icon{ font-size:44px; opacity:.3; }
.cartEmpty-title{ font-size:15px; font-weight:700; color:var(--txt-2); }
.cartEmpty-sub{ font-size:13px; color:var(--txt-3); }

/* Cart item */
.cartItem{
  display:grid; grid-template-columns:52px 1fr auto;
  gap:10px; align-items:center;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:10px;
  touch-action:pan-y;
  transition:transform .18s, opacity .18s;
}
.ph--cart{
  width:52px; height:52px; border-radius:10px;
  background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; overflow:hidden;
}
.ph--cart img{ width:100%; height:100%; object-fit:contain; padding:4px; }
.ph--cart-empty{ font-size:10px; color:var(--txt-3); }

.cartTitle{ font-size:13px; font-weight:700; color:var(--txt); line-height:1.3; }
.cartSub{ font-size:11px; color:var(--txt-3); margin-top:2px; margin-bottom:6px; }
.cartQty{ display:flex; align-items:center; gap:7px; }
.cartQty .btnIcon{ width:28px; height:28px; font-size:15px; border-radius:var(--r-xs); }
.cartQty strong{ font-size:14px; font-weight:800; min-width:18px; text-align:center; }

.priceCol{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.priceCol strong{ font-size:14px; font-weight:800; color:var(--amber); white-space:nowrap; }
.btnGhost{
  width:26px; height:26px;
  border-radius:var(--r-xs); border:1px solid var(--border);
  background:transparent; color:var(--txt-3);
  font-size:16px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .12s, color .12s;
}
.btnGhost:hover{ border-color:rgba(239,68,68,.4); color:var(--red); }

/* Cart footer */
.cartTotal{
  padding:14px 18px max(14px,env(safe-area-inset-bottom));
  border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:10px;
}
.totalRow{
  display:flex; justify-content:space-between; align-items:baseline; gap:8px;
}
.totalLabel{ font-size:13px; color:var(--txt-2); font-weight:500; }
.totalAmount{ font-size:26px; font-weight:900; color:var(--amber); letter-spacing:-.5px; }

.cartFooter{ display:flex; gap:8px; }
.btnWA{
  flex:1;
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  padding:13px 16px; border-radius:14px;
  background:linear-gradient(135deg,var(--green-wa),var(--green-wa2));
  color:#fff; font-family:inherit; font-size:14px; font-weight:800;
  border:none;
  box-shadow:0 4px 18px rgba(37,211,102,.3);
  transition:transform .12s, box-shadow .12s;
}
.btnWA:hover{ transform:translateY(-1px); box-shadow:0 6px 24px rgba(37,211,102,.4); }
.btnWA:active,.btnWA.is-pressing{ transform:scale(.97); }
.btnWA svg{ width:19px; height:19px; flex-shrink:0; fill:white; }
.drawer[data-count="0"] .btnWA{ opacity:.35; pointer-events:none; }

.btnClear{
  display:inline-flex; align-items:center; justify-content:center;
  padding:13px 14px; border-radius:14px;
  background:transparent; color:var(--txt-3);
  border:1px solid var(--border);
  font-family:inherit; font-size:13px; font-weight:600;
  transition:border-color .12s, color .12s;
}
.btnClear:hover{ border-color:rgba(239,68,68,.35); color:var(--red); }

/* Scale for many items */
.drawer[data-scale="xs"] .cartItem{ grid-template-columns:44px 1fr auto; }
.drawer[data-scale="xxs"] .cartItem{ grid-template-columns:36px 1fr auto; padding:8px; }

/* ── TOAST ───────────────────────────────────────── */
.toast{
  position:fixed; left:50%; bottom:24px; z-index:200;
  transform:translateX(-50%) translateY(16px);
  background:var(--card-2); border:1px solid var(--border);
  color:var(--txt); font-size:13px; font-weight:600;
  padding:10px 18px; border-radius:12px;
  box-shadow:var(--shadow-lg);
  opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s;
  white-space:nowrap;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ── WHATSAPP FAB ────────────────────────────────── */
.wa-fab-img{
  position:fixed; right:18px; bottom:20px; z-index:60;
  display:flex; align-items:center; gap:10px;
  transition:opacity .2s, transform .2s;
}
.wa-fab-img.hidden{ opacity:0; pointer-events:none; transform:scale(.8); }

.wa-fab-img a{
  display:flex; align-items:center; justify-content:center;
  width:54px; height:54px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--green-wa),var(--green-wa2));
  box-shadow:0 4px 20px rgba(37,211,102,.4);
  transition:transform .15s, box-shadow .15s;
}
.wa-fab-img a:hover{
  transform:scale(1.08);
  box-shadow:0 6px 28px rgba(37,211,102,.55);
}
.wa-fab-img a:active,.wa-fab-img a.is-pressing{ transform:scale(.94); }
.wa-fab-img a svg{ width:27px; height:27px; fill:white; }

.fab-tip{
  background:var(--card-2); border:1px solid var(--border);
  padding:6px 12px; border-radius:10px;
  font-size:12px; font-weight:600; color:var(--txt-2);
  box-shadow:var(--shadow);
  opacity:0; transform:translateX(8px);
  pointer-events:none;
  transition:opacity .18s, transform .18s;
  white-space:nowrap;
}
.wa-fab-img:hover .fab-tip{ opacity:1; transform:translateX(0); }

/* ── SUGGESTIONS ─────────────────────────────────── */
.suggest{
  position:fixed; left:0; top:0;
  background:var(--surface); border:1px solid var(--border-2);
  border-radius:14px;
  box-shadow:var(--shadow-lg);
  max-height:70vh; overflow:auto;
  z-index:1000;
  scrollbar-width:thin; scrollbar-color:var(--card) transparent;

}

<script>
/* ══════════ CONFIG ══════════ */
const LOGO_SRC          = 'logo.png';
const WHATSAPP_NUMBER   = '5491151177197';

const TILE_BG = {
  alcohol_cigarros: 'img/alcohol_cigarros.png',
  almacen:          'img/almacen.webp',
  bebidas:          'img/bebidas.jpg',

const TILE_EMOJI = {
  alcohol_cigarros: '🍺',
  almacen:          '🛒',
  bebidas:          '🥤',
  comida:           '🍔',
  snacks_dulces:    '🍿',

};

/* ══════════ ASSETS ══════════ */

waFabImg.href  = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('Hola! Quiero hacer una consulta.')}`;

/* ══════════ CATALOG ══════════ */
let CATALOG = null;
const FALLBACK = [
  {"id":1,"nombre":"Cerveza Quilmes Lata 473ml","marca":"Quilmes","precio":1900,"unidad":"lata","categoria":"Alcohol","imagen":""},
  {"id":2,"nombre":"Fernet Branca 750ml","marca":"Branca","precio":9400,"unidad":"botella","categoria":"Alcohol","imagen":""},
  {"id":3,"nombre":"Marlboro Box","marca":"Marlboro","precio":5900,"unidad":"atado","categoria":"Cigarrillos","imagen":""},
  {"id":4,"nombre":"Coca-Cola 1.5L","marca":"Coca-Cola","precio":2800,"unidad":"botella","categoria":"Bebidas","imagen":""},
  {"id":6,"nombre":"Empanada","marca":"Casera","precio":1500,"unidad":"unidad","categoria":"Comida","imagen":""},
  {"id":7,"nombre":"Papas Lays 110g","marca":"Lays","precio":2300,"unidad":"paquete","categoria":"Snacks","imagen":""},
  {"id":8,"nombre":"Chocolate Milka 100g","marca":"Milka","precio":2400,"unidad":"tableta","categoria":"Dulces","imagen":""},
  {"id":9,"nombre":"Cable USB-C 1m","marca":"Genérico","precio":3200,"unidad":"unidad","categoria":"Accesorios","imagen":""},
  {"id":10,"nombre":"Combo Gaseosa + Snacks","marca":"Promo","precio":3500,"unidad":"combo","categoria":"Ofertas","imagen":""}
];
async function getCatalog(){
  if(CATALOG) return CATALOG;
  try{
    const r = await fetch('productos.json?v=4',{cache:'no-store'});
    if(!r.ok) throw 0;
    const data = await r.json();
    if(!Array.isArray(data)) throw 0;
    CATALOG = data;
  }catch{ CATALOG = FALLBACK; }
  updateOfferBadge();
  return CATALOG;
}
const fmt = n => new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(Number(n)||0);

/* ══════════ HOME TILES ══════════ */
(function renderHome(){
  const tiles = [
    {slug:'alcohol-cigarros', label:'Alcohol y Cigarros', cats:['Alcohol','Cigarrillos'], key:'alcohol_cigarros'},
    {slug:'almacen',          label:'Almacén',            cats:['Almacen'],               key:'almacen'},
    {slug:'bebidas',          label:'Bebidas',            cats:['Bebidas'],               key:'bebidas'},
    {slug:'comida',           label:'Comida',             cats:['Comida'],                key:'comida'},
    {slug:'snacks-dulces',    label:'Snacks y Dulces',    cats:['Snacks','Dulces'],       key:'snacks_dulces'},
    {slug:'accesorios',       label:'Accesorios',         cats:['Accesorios'],            key:'accesorios'}
  ];
  homeGrid.innerHTML = '';
  tiles.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tile pressable';
    el.innerHTML = `
      <div class="tile__bg" style="background-image:url('${TILE_BG[t.key]||''}')"></div>
      <div class="tile__scrim"></div>
      <div class="tile__content">
        <span class="tile__emoji">${TILE_EMOJI[t.key]||'📦'}</span>
        <span class="tile__label">${t.label}</span>
        <span class="tile__sub">Ver productos →</span>
      </div>
    `;
    el.addEventListener('click', () => openCategoryGroup(t.label, t.slug, t.cats));
    makePressable(el);
    homeGrid.appendChild(el);
  });
})();

/* ══════════ NAVIGATION ══════════ */
const view    = document.getElementById('view');
const drawer  = document.getElementById('cartDrawer');
const overlay = document.getElementById('drawerOverlay');

function topIsHome(){ const p=Array.from(view.querySelectorAll('.page')); return p.length && p.at(-1).id==='home'; }
function drawerOpen(){ return drawer.classList.contains('open'); }
function updateFabVisibility(){ const hide=drawerOpen()||!topIsHome(); waFabWrap.classList.toggle('hidden',hide); }

let homeScrollY = 0;
const getScrollTop = ()=>(document.scrollingElement||document.documentElement).scrollTop;
function setScrollTop(y){ const sc=document.scrollingElement||document.documentElement; sc.scrollTop=y; requestAnimationFrame(()=>sc.scrollTop=y); setTimeout(()=>sc.scrollTop=y,50); }
function scrollToTopHard(){ const sc=document.scrollingElement||document.documentElement; if(document.activeElement?.blur)document.activeElement.blur(); sc.scrollTop=0; requestAnimationFrame(()=>sc.scrollTop=0); setTimeout(()=>sc.scrollTop=0,50); }

function pushStateSafe(s){ try{history.pushState(s,"");}catch{} }
function replaceHomeState(){ try{history.replaceState({home:true},"");}catch{} }
window.addEventListener('popstate', ()=>{
  if(drawerOpen()){ closeCartDrawer(true); return; }
  if(!topIsHome()){ goHome(); return; }
});

function pushPage(el){
  const stack=Array.from(view.querySelectorAll('.page'));
  const top=stack.at(-1);
  if(top && top.id==='home') homeScrollY=getScrollTop();
  stack.forEach(p=>p.classList.remove('active'));
  el.classList.add('page');
  view.appendChild(el);
  scrollToTopHard();
  requestAnimationFrame(()=>el.classList.add('active'));
  attachSwipeBack(el);
  updateFabVisibility();
  pushStateSafe({page:true});
}
function popTop(){
  const pages=Array.from(view.querySelectorAll('.page'));
  const top=pages.at(-1); if(!top||top.id==='home') return;
  setScrollTop(homeScrollY);
  top.classList.remove('active'); top.classList.add('exit-right');
  top.addEventListener('transitionend',()=>{ top.remove(); document.getElementById('home').classList.add('active'); updateFabVisibility(); },{once:true});
}
function goHome(){
  Array.from(view.querySelectorAll('.page')).forEach(p=>{ if(p.id!=='home') p.remove(); });
  document.getElementById('home').classList.add('active');
  setScrollTop(homeScrollY);
  updateFabVisibility();
}

function attachSwipeBack(page){
  let sx=0,sy=0,tracking=false,dragging=false,pid=null;
  function isInteractiveStart(e){ return !!e.target.closest('button,a,input,select,textarea,.btnPrimary,.btnIcon,.backBtn,label'); }
  const onDown=e=>{ if(isInteractiveStart(e))return; tracking=true; dragging=false; sx=e.clientX; sy=e.clientY; pid=e.pointerId; page.setPointerCapture?.(pid); page.style.willChange='transform'; };
  const onMove=e=>{ if(!tracking)return; const dx=e.clientX-sx,dy=Math.abs(e.clientY-sy); if(dx>0&&dy<80){dragging=true; page.style.transition='none'; page.style.transform=`translateX(${dx}px)`; e.preventDefault?.();} };
  const onUp=e=>{ if(!tracking)return; tracking=false; const dx=e.clientX-sx,dy=Math.abs(e.clientY-sy); page.releasePointerCapture?.(pid); page.style.transition=''; if(dragging&&dx>100&&dy<80){setScrollTop(homeScrollY); page.style.transform='translateX(100%)'; page.addEventListener('transitionend',()=>{ page.remove(); document.getElementById('home').classList.add('active'); updateFabVisibility(); },{once:true}); }else{ page.style.transform='translateX(0)'; } page.style.willChange=''; };
  page.addEventListener('pointerdown',onDown,{passive:false});
  page.addEventListener('pointermove',onMove,{passive:false});
  page.addEventListener('pointerup',onUp,{passive:false});
  page.addEventListener('pointercancel',onUp,{passive:false});
}

/* ══════════ CATEGORIES ══════════ */
async function openCategoryGroup(label, slug, cats){
  const list=(await getCatalog()).filter(p=>cats.includes(p.categoria));
  const page=document.createElement('div');
  page.id=`cat-${slug}`;
  page.innerHTML=`
    <div class="titleBar">
      <a id="back-${slug}" class="backBtn pressable" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Inicio
      </a>
      <h2>${label}</h2>
    </div>
    <div class="grid" id="grid-${slug}"></div>`;
  pushPage(page);
  makePressable(page.querySelector(`#back-${slug}`));
  page.querySelector(`#back-${slug}`).addEventListener('click',e=>{ e.preventDefault(); goHome(); });
  const grid=page.querySelector(`#grid-${slug}`);
  if(!list.length){ grid.innerHTML=`<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--txt-3);font-weight:600">Sin productos en esta categoría.</div>`; return; }
  list.forEach(p=>grid.appendChild(productCard(p)));
}

offerBtn.addEventListener('click',()=>{
  const top=Array.from(view.querySelectorAll('.page')).at(-1);
  if(top&&top.id==='cat-ofertas'){ history.back(); return; }
  openOffers();
});
async function openOffers(){
  const list=(await getCatalog()).filter(p=>p.categoria==='Ofertas');
  const page=document.createElement('div');
  page.id='cat-ofertas';
  page.innerHTML=`
    <div class="titleBar">
      <a id="back-ofertas" class="backBtn pressable" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Inicio
      </a>
      <h2>🏷️ Ofertas</h2>
    </div>
    <div class="grid" id="grid-ofertas"></div>`;
  pushPage(page);
  makePressable(page.querySelector('#back-ofertas'));
  page.querySelector('#back-ofertas').addEventListener('click',e=>{ e.preventDefault(); goHome(); });
  const grid=page.querySelector('#grid-ofertas');
  if(!list.length){ grid.innerHTML=`<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--txt-3);font-weight:600">Sin ofertas por ahora.</div>`; return; }
  list.forEach(p=>grid.appendChild(productCard(p)));
}

async function updateOfferBadge(){
  const count=(await getCatalog()).filter(p=>p.categoria==='Ofertas').length;
  offerBadge.textContent=count;
  offerBadge.classList.toggle('on',count>0);
}

logoHome.addEventListener('click', goHome);
makePressable(logoHome);

/* ══════════ PRODUCT CARD ══════════ */
function productCard(p){
  const card=document.createElement('article');
  card.className='card';
  const imgTag=p.imagen
    ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=ph-empty>Sin imagen</span>'">`
    : '<span class="ph-empty">Sin imagen</span>';
  card.innerHTML=`
    <div class="ph">${imgTag}</div>
    <div class="info">
      <div class="prod-brand">${p.marca}</div>
      <div class="prod-name">${p.nombre}</div>
      <div class="prod-price">$ ${fmt(p.precio)}</div>
      <div class="prod-unit">por ${p.unidad}</div>
    </div>
    <div class="qtyRow">
      <div class="qtyCtrl">
        <button class="btnIcon pressable" data-act="minus" aria-label="Reducir">−</button>
        <strong class="qty" aria-live="polite">1</strong>
        <button class="btnIcon pressable" data-act="plus" aria-label="Aumentar">+</button>
      </div>
      <button class="btnPrimary pressable" data-act="add" aria-label="Agregar al carrito">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        Agregar
      </button>
    </div>`;
  card.querySelectorAll('.pressable').forEach(makePressable);
  let qty=1; const qtyEl=card.querySelector('.qty');
  card.addEventListener('click',e=>{
    const act=e.target.getAttribute('data-act')||e.target.closest('[data-act]')?.getAttribute('data-act');
    if(!act) return;
    if(act==='minus'){ qty=Math.max(1,qty-1); qtyEl.textContent=qty; }
    if(act==='plus'){ qty=Math.min(99,qty+1); qtyEl.textContent=qty; }
    if(act==='add'){ addToCart(p,qty); qty=1; qtyEl.textContent='1'; }
  });
  return card;
}

/* ══════════ CART ══════════ */
const cartList  = document.getElementById('cartList');
const cartSum   = document.getElementById('cartSum');
const cartBadge = document.getElementById('cartBadge');

function openCartDrawer(){ if(drawerOpen())return; overlay.classList.add('show'); drawer.classList.add('open'); updateFabVisibility(); pushStateSafe({drawer:true}); }
function closeCartDrawer(byPop=false){ overlay.classList.remove('show'); drawer.classList.remove('open'); drawer.style.transform=''; updateFabVisibility(); if(!byPop){ try{history.back();}catch{} } }
overlay.addEventListener('click',()=>closeCartDrawer(false));

const cart = new Map();

function showToast(msg='Agregado al carrito'){
  toast.textContent=msg; toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1800);
}

function addToCart(p, qty){
  const prev=cart.get(p.id)?.qty||0;
  cart.set(p.id,{p,qty:prev+qty});
  renderCart(); showToast(`✓ ${p.nombre}`);
}

function attachSwipeDelete(row, id){
  let sx=0,sy=0,tracking=false,dragging=false,pid=null;
  const onDown=e=>{ tracking=true; dragging=false; sx=e.clientX; sy=e.clientY; pid=e.pointerId; row.setPointerCapture?.(pid); row.style.willChange='transform'; };
  const onMove=e=>{ if(!tracking)return; const dx=e.clientX-sx,dy=Math.abs(e.clientY-sy); if(dx<0&&dy<80){dragging=true; row.style.transform=`translateX(${dx}px)`; row.style.opacity=String(Math.max(.3,1+dx/220)); e.preventDefault?.();} };
  const onUp=e=>{ if(!tracking)return; tracking=false; row.releasePointerCapture?.(pid); const dx=e.clientX-sx,dy=Math.abs(e.clientY-sy); if(dragging&&dx<-100&&dy<80){cart.delete(id);renderCart();}else{row.style.transform='translateX(0)';row.style.opacity='1';} row.style.willChange=''; };
  row.addEventListener('pointerdown',onDown,{passive:false});
  row.addEventListener('pointermove',onMove,{passive:false});
  row.addEventListener('pointerup',onUp,{passive:false});
  row.addEventListener('pointercancel',onUp,{passive:false});
}

function renderCart(){
  cartList.innerHTML=''; let total=0;

  if(cart.size===0){
    cartList.innerHTML=`
      <div class="cartEmpty">
        <span class="cartEmpty-icon">🛒</span>
        <span class="cartEmpty-title">Tu carrito está vacío</span>
        <span class="cartEmpty-sub">Explorá los productos y sumá lo que querés pedir</span>
      </div>`;
    cartSum.textContent='$ 0';
    cartBadge.classList.remove('on'); cartBadge.textContent='0';
    cartChip.textContent='0 items';
    drawer.dataset.count='0'; drawer.dataset.scale='md';
    return;
  }

  cart.forEach(({p,qty})=>{
    const line=p.precio*qty; total+=line;
    const row=document.createElement('div');
    row.className='cartItem';
    const imgHtml=p.imagen
      ? `<div class="ph--cart"><img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.src='${LOGO_SRC}'"></div>`
      : `<div class="ph--cart"><span class="ph--cart-empty">Sin imagen</span></div>`;
    row.innerHTML=`
      ${imgHtml}
      <div>
        <div class="cartTitle">${p.nombre}</div>
        <div class="cartSub">${p.marca} · $ ${fmt(p.precio)} c/u</div>
        <div class="cartQty">
          <button class="btnIcon pressable" data-id="${p.id}" data-act="dec" aria-label="Reducir">−</button>
          <strong>${qty}</strong>
          <button class="btnIcon pressable" data-id="${p.id}" data-act="inc" aria-label="Aumentar">+</button>
        </div>
      </div>
      <div class="priceCol">
        <strong>$ ${fmt(line)}</strong>
        <button class="btnGhost pressable" title="Quitar" data-id="${p.id}" data-act="del" aria-label="Quitar">×</button>
      </div>`;
    cartList.appendChild(row);
    row.querySelectorAll('.pressable').forEach(makePressable);
    attachSwipeDelete(row, p.id);
  });

  const nItems=cart.size;
  const totalQty=[...cart.values()].reduce((s,{qty})=>s+qty,0);
  cartSum.textContent=`$ ${fmt(total)}`;
  cartBadge.textContent=totalQty; cartBadge.classList.toggle('on',totalQty>0);
  cartChip.textContent=`${totalQty} item${totalQty!==1?'s':''}`;
  drawer.dataset.count=String(nItems);
  drawer.dataset.scale=nItems>=8?'xxs':nItems>=5?'xs':'md';
}

cartList.addEventListener('click',e=>{
  const act=e.target.getAttribute('data-act')||e.target.closest('[data-act]')?.getAttribute('data-act');
  if(!act) return;
  const id=Number(e.target.getAttribute('data-id')||e.target.closest('[data-id]')?.getAttribute('data-id'));
  const item=cart.get(id);
  if(act==='inc'&&item){ item.qty=Math.min(99,item.qty+1); }
  if(act==='dec'&&item){ item.qty=Math.max(0,item.qty-1); if(item.qty===0) cart.delete(id); }
  if(act==='del'){ cart.delete(id); }
  renderCart();
});

btnWA.addEventListener('click',()=>{
  if(cart.size===0) return;
  let lines=['🛒 *Pedido Kiosco Nelson*','']; let total=0;
  cart.forEach(({p,qty})=>{ const line=p.precio*qty; total+=line; lines.push(`• ${qty} x ${p.nombre} (${p.marca}) — $ ${fmt(p.precio)} = $ ${fmt(line)}`); });
  lines.push('','─'.repeat(20),`*TOTAL: $ ${fmt(total)}*`);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join('\n'))}`,'_blank');
});

/* ══════════ CART SWIPE CLOSE ══════════ */
function enableCartSwipeClose(){
  let startX=0,startY=0,dragging=false,captured=false,pid=null;
  function canStart(e){ if(!drawer.classList.contains('open'))return false; const t=e.target; if(t.closest('#cartClose,#btnWA,#btnClear,button,a'))return false; if(t.closest('.cartItem'))return false; return true; }
  const onDown=e=>{ if(!canStart(e))return; dragging=true; captured=false; startX=e.clientX; startY=e.clientY; };
  const onMove=e=>{ if(!dragging)return; const dx=e.clientX-startX,dy=Math.abs(e.clientY-startY); if(!captured&&dx>10&&dy<80){pid=e.pointerId; drawer.setPointerCapture?.(pid); drawer.style.willChange='transform'; overlay.style.transition='none'; captured=true;} if(captured&&dx>0&&dy<80){drawer.style.transform=`translateX(${dx}px)`; const max=Math.min(window.innerWidth*.6,400); overlay.style.opacity=String(Math.max(0,1-dx/max)); e.preventDefault?.();} };
  const onUp=e=>{ if(!dragging)return; dragging=false; if(captured){drawer.releasePointerCapture?.(pid); drawer.style.willChange=''; overlay.style.transition='';} const dx=e.clientX-startX,dy=Math.abs(e.clientY-startY); if(dx>100&&dy<80){closeCartDrawer(true); overlay.style.opacity='';}else{drawer.style.transform=''; overlay.style.opacity='';} };
  drawer.addEventListener('pointerdown',onDown,{passive:false});
  drawer.addEventListener('pointermove',onMove,{passive:false});
  drawer.addEventListener('pointerup',onUp,{passive:false});
  drawer.addEventListener('pointercancel',onUp,{passive:false});
}

/* ══════════ SEARCH SUGGESTIONS ══════════ */
const inputQ    = document.getElementById('q');
const suggest   = document.getElementById('suggest');
let suggestItems=[], suggestIndex=-1, SUGGEST_POOL=null;

const CATEGORY_ALIASES=[
  {cats:['Alcohol'],      terms:['alcohol','alcoh','alc']},
  {cats:['Cigarrillos'],  terms:['cigarrillos','cigarros','cigarr','cig']},
  {cats:['Bebidas'],      terms:['bebidas','bebid','beb']},
  {cats:['Comida'],       terms:['comida','comid','comi']},
  {cats:['Almacen'],      terms:['almacen','almacén','alm']},
  {cats:['Snacks'],       terms:['snacks','snack','sna']},
  {cats:['Dulces'],       terms:['dulces','dulce','dulc']},
  {cats:['Snacks','Dulces'],terms:['snacks y dulces','snacks dulces']},
  {cats:['Alcohol','Cigarrillos'],terms:['alcohol y cigarr','alcohol y cigarros','alcohol y cigarrillos']}
];
function matchCategoryTerms(q){ q=q.toLowerCase().trim(); if(q.length<3)return null; for(const a of CATEGORY_ALIASES){if(a.terms.some(t=>q.includes(t)))return a.cats;} return null; }

async function buildSuggestPool(){
  const cat=await getCatalog();
  const map=new Map();
  cat.forEach(p=>{ if(!(p.nombre||'').trim())return; map.set(p.id,{texto:(p.nombre||'').trim(),marca:(p.marca||'').trim(),id:p.id}); });
  return Array.from(map.values());
}

function positionSuggest(){
  if(suggest.hidden)return;
  const r=inputQ.getBoundingClientRect();
  suggest.style.left=`${Math.round(r.left)}px`;
  suggest.style.top=`${Math.round(r.bottom+6)}px`;
  suggest.style.width=`${Math.round(r.width)}px`;
  const avail=(window.visualViewport?.height||window.innerHeight)-(r.bottom+6)-8;
  suggest.style.maxHeight=`${Math.max(200,avail)}px`;
}
window.addEventListener('resize',positionSuggest);
window.addEventListener('scroll',positionSuggest,true);

function renderSuggest(list){
  suggest.innerHTML='';
  if(!list.length){suggest.hidden=true;return;}
  list.slice(0,30).forEach((item,i)=>{
    const li=document.createElement('li');
    li.className='suggest-item'+(i===suggestIndex?' active':'');
    li.innerHTML=`<span>${item.texto}</span>${item.marca?`<small>${item.marca}</small>`:''}`;
    li.addEventListener('mousedown',e=>{ e.preventDefault(); inputQ.value=item.texto; openSearchResults(item.texto); hideSuggest(); });
    suggest.appendChild(li);
  });
  suggest.hidden=false; positionSuggest();
}
function hideSuggest(){ suggest.hidden=true; suggestIndex=-1; suggest.innerHTML=''; }

inputQ.addEventListener('input',async()=>{
  const q=inputQ.value.trim().toLowerCase();
  if(!q){hideSuggest();return;}
  if(!SUGGEST_POOL) SUGGEST_POOL=await buildSuggestPool();
  let catPart=[];
  const matchedCats=matchCategoryTerms(q);
  if(matchedCats){ const prods=(await getCatalog()).filter(p=>matchedCats.includes(p.categoria)); catPart=prods.map(p=>({texto:p.nombre,marca:p.marca||'',id:p.id})); }
  const starts=SUGGEST_POOL.filter(x=>x.texto.toLowerCase().startsWith(q)||(x.marca||'').toLowerCase().startsWith(q));
  const startsSet=new Set(starts.map(x=>x.id));
  const contains=SUGGEST_POOL.filter(x=>!startsSet.has(x.id)&&(x.texto.toLowerCase().includes(q)||(x.marca||'').toLowerCase().includes(q)));
  const seen=new Set(); suggestItems=[];
  for(const block of [catPart,starts,contains]){ for(const it of block){if(!seen.has(it.id)){seen.add(it.id);suggestItems.push(it);}}}
  suggestIndex=-1; renderSuggest(suggestItems);
});

inputQ.addEventListener('keydown',e=>{
  if(suggest.hidden)return;
  if(e.key==='ArrowDown'){e.preventDefault();suggestIndex=Math.min(suggestIndex+1,Math.min(29,suggestItems.length-1));renderSuggest(suggestItems);}
  else if(e.key==='ArrowUp'){e.preventDefault();suggestIndex=Math.max(suggestIndex-1,-1);renderSuggest(suggestItems);}
  else if(e.key==='Enter'&&suggestIndex>=0){e.preventDefault();const sel=suggestItems[suggestIndex];inputQ.value=sel.texto;openSearchResults(sel.texto);hideSuggest();}
  else if(e.key==='Escape'){hideSuggest();}
});
inputQ.addEventListener('keydown',e=>{ if(e.key==='Enter'&&suggestIndex<0&&inputQ.value.trim()){hideSuggest();openSearchResults(inputQ.value.trim());} });
document.addEventListener('pointerdown',e=>{ if(!suggest.hidden&&!suggest.contains(e.target)&&e.target!==inputQ)hideSuggest(); });

async function openSearchResults(text){
  const q=String(text||'').trim().toLowerCase();
  const cats=matchCategoryTerms(q);
  const list=(await getCatalog()).filter(p=>{
    const nm=(p.nombre||'').toLowerCase(),br=(p.marca||'').toLowerCase();
    return nm.includes(q)||br.includes(q)||(cats&&cats.includes(p.categoria));
  });
  const page=document.createElement('div');
  page.id='cat-search';
  page.innerHTML=`
    <div class="titleBar">
      <a id="back-search" class="backBtn pressable" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Inicio
      </a>
      <h2>Resultados</h2>
    </div>
    <div class="grid" id="grid-search"></div>`;
  pushPage(page);
  makePressable(page.querySelector('#back-search'));
  page.querySelector('#back-search').addEventListener('click',e=>{e.preventDefault();goHome();});
  const grid=page.querySelector('#grid-search');
  if(!list.length){grid.innerHTML=`<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--txt-3);font-weight:600">Sin resultados para "${text}".</div>`; return;}
  list.forEach(p=>grid.appendChild(productCard(p)));
}

/* ══════════ PRESSABLE ══════════ */
function makePressable(el){
  if(!el) return;
  el.addEventListener('pointerdown',()=>el.classList.add('is-pressing'),{passive:true});
  const clear=()=>el.classList.remove('is-pressing');
  el.addEventListener('pointerup',clear,{passive:true});
  el.addEventListener('pointercancel',clear,{passive:true});
  el.addEventListener('pointerleave',clear,{passive:true});
}

/* ══════════ SPLASH ══════════ */
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
async function runSplash(){
  const MIN_MS=2800, start=performance.now();
  splashLogo.src=LOGO_SRC;
  let decoded=Promise.resolve();
  if(splashLogo.decode){ decoded=splashLogo.decode().catch(()=>{}); }
  else{ decoded=new Promise(res=>{splashLogo.onload=()=>res();splashLogo.onerror=()=>res();}); }
  const docReady=(document.readyState==='complete')?Promise.resolve():new Promise(res=>window.addEventListener('load',res,{once:true}));
  const remain=Math.max(0,MIN_MS-(performance.now()-start));
  await Promise.all([decoded,docReady,wait(remain)]);
  splash.classList.add('is-hidden');
  splash.addEventListener('transitionend',()=>splash.remove(),{once:true});
}

/* ══════════ ONBOARDING ══════════ */
(function initOnboarding(){
  const ob = document.getElementById('onboarding');
  if(localStorage.getItem('ob_dismissed')) { ob.classList.add('hidden'); return; }
  document.getElementById('obClose').addEventListener('click', () => {
    ob.classList.add('hidden');
    localStorage.setItem('ob_dismissed','1');
  });
})();

/* ══════════ BOOT ══════════ */
(function boot(){
  replaceHomeState();
  getCatalog();
  updateOfferBadge();
  updateFabVisibility();
  makePressable(waFabWrap);
  makePressable(document.getElementById('offerBtn'));
  makePressable(document.getElementById('cartBtn'));
  enableCartSwipeClose();
  renderCart();
  runSplash();
})();
</script>
